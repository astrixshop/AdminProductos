<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRYX Admin</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:30px;color:#222;}
.container{max-width:1200px;margin:auto;}
.card{background:white;padding:25px;border-radius:20px;margin-bottom:25px;box-shadow:0 4px 15px rgba(0,0,0,0.06);}
h1{margin-bottom:20px;color:#25D366;}
input,select,textarea{width:100%;padding:12px;margin-top:8px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px;}
button{border:none;padding:12px 20px;border-radius:10px;font-weight:bold;cursor:pointer;}
.save-btn{background:#25D366;color:white;}
.delete-btn{background:#ff3b30;color:white;}
table{width:100%;border-collapse:collapse;}
th,td{padding:15px;border-bottom:1px solid #ddd;text-align:left;}
img{width:70px;height:70px;object-fit:cover;border-radius:10px;}
.preview{width:150px;height:150px;object-fit:cover;border-radius:15px;margin-bottom:15px;display:none;}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Panel Admin ASTRYX</h1>
<form id="productForm">
<label>Imagen desde galería</label>
<input type="file" id="imageFile" accept="image/*" required>
<img id="preview" class="preview">
<label>Categoría</label>
<select id="categoria">
<option value="Camisetas">Camisetas</option>
<option value="Pantalones">Pantalones</option>
<option value="Chaquetas">Chaquetas</option>
</select>
<label>Precio</label>
<input type="number" id="precio" required>
<label><input type="checkbox" id="agotado"> Producto agotado</label>
<br><br>
<button type="submit" class="save-btn">Subir producto</button>
</form>
</div>
<div class="card">
<table>
<thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody id="productsTableBody"></tbody>
</table>
</div>
</div>
