<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTRYX Admin</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:30px;color:#222;}
.container{max-width:1200px;margin:auto;}
.card{background:white;padding:25px;border-radius:20px;margin-bottom:25px;box-shadow:0 4px 15px rgba(0,0,0,0.06);}
h1{margin-bottom:20px;color:#25D366;}
input,select,textarea{width:100%;padding:12px;margin-top:8px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px;}
button{border:none;padding:12px 20px;border-radius:10px;font-weight:bold;cursor:pointer;}
.save-btn{background:#25D366;color:white;width:100%;font-size:1rem;}
.delete-btn{background:#ff3b30;color:white;}
table{width:100%;border-collapse:collapse;}
th,td{padding:15px;border-bottom:1px solid #ddd;text-align:left;}
.thumb{width:70px;height:70px;object-fit:cover;border-radius:10px;}
.preview{width:150px;height:150px;object-fit:cover;border-radius:15px;margin-bottom:15px;display:none;}
#status{padding:10px;border-radius:10px;margin-top:10px;display:none;font-weight:bold;}
.ok{background:#d4edda;color:#155724;}
.err{background:#f8d7da;color:#721c24;}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>Panel Admin ASTRYX</h1>
<label>Nombre del producto</label>
<input type="text" id="nombre" placeholder="Ej: Camiseta negra" required>
<label>Imagen desde galería</label>
<input type="file" id="imageFile" accept="image/*">
<img id="preview" class="preview">
<label>Categoría</label>
<select id="categoria">
<option value="Camisetas">Camisetas</option>
<option value="Pantalones">Pantalones</option>
<option value="Chaquetas">Chaquetas</option>
</select>
<label>Precio (Gs.)</label>
<input type="number" id="precio" placeholder="Ej: 150000">
<label><input type="checkbox" id="agotado"> Producto agotado</label>
<br><br>
<button class="save-btn" onclick="subirProducto()">Subir producto</button>
<div id="status"></div>
</div>
<div class="card">
<h2 style="margin-bottom:15px;">Productos cargados</h2>
<table>
<thead><tr><th>Imagen</th><th>Nombre</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
<tbody id="productsTableBody"><tr><td colspan="5">Cargando...</td></tr></tbody>
</table>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// XOR decode
function xd(a,k){var r="";for(var i=0;i<a.length;i++){r+=String.fromCharCode(a[i]^k.charCodeAt(i%k.length));}return r;}
var K="AstryxK3y!2026";
var cfg={
  apiKey:xd([0,58,14,19,42,1,9,74,22,21,31,3,6,85,10,10,44,56,61,61,126,2,44,71,74,72,87,78,13,69,63,51,78,42,41,93,33,109,103],K),
  authDomain:xd([32,0,0,0,16,0,56,71,22,83,87,29,84,82,119,17,23,92,31,17,57,86,27,64,65,85,83,70,49,93,23,29,20],K),
  projectId:xd([32,0,0,0,16,0,56,71,22,83,87,29,84,82,119,17,23],K),
  storageBucket:xd([32,0,0,0,16,0,56,71,22,83,87,29,84,82,119,17,23,92,31,17,57,86,27,64,65,85,65,66,46,1,21,21,28,86,42,67,9],K),
  messagingSenderId:xd([116,75,66,64,76,78,126,2,78,22,3,2],K),
  appId:xd([112,73,65,74,79,74,126,5,76,16,5,7,3,4,123,4,17,16,67,79,125,4,72,16,11,81,11,87,121,23,17,71,77,26,124,82,73,16,84,5,7],K)
};
var GT=xd([38,27,4,45,16,55,36,117,41,76,71,99,91,88,116,38,46,21,27,64,4,93,46,81,127,104,99,114,13,43,23,31,55,40,127,101,51,64,102,89],K);
var GU=xd([32,0,0,0,16,0,56,91,22,81],K);
var GR=xd([0,0,0,0,16,0,24,71,22,83,87],K);

const app = initializeApp(cfg);
const db = getFirestore(app);

document.getElementById("imageFile").addEventListener("change", function(e){
  const f = e.target.files[0];
  if(f){ const p=document.getElementById("preview"); p.src=URL.createObjectURL(f); p.style.display="block"; }
});

function setStatus(msg, ok){
  const s=document.getElementById("status");
  s.textContent=msg; s.className=ok?"ok":"err"; s.style.display="block";
}

async function uploadToGitHub(file, fileName){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = async () => {
      const content = reader.result.split(",")[1];
      try {
        const res = await fetch(`https://api.github.com/repos/${GU}/${GR}/contents/images/${fileName}`, {
          method: "PUT",
          headers: { Authorization: `token ${GT}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message: `upload ${fileName}`, content: content })
        });
        if(!res.ok){ const e=await res.json(); reject(e.message); return; }
        resolve(`https://${GU}.github.io/${GR}/images/${fileName}`);
      } catch(e){ reject(e); }
    };
    reader.onerror = reject;
  });
}

window.subirProducto = async function(){
  const nombre = document.getElementById("nombre").value.trim();
  const precio = document.getElementById("precio").value;
  const file = document.getElementById("imageFile").files[0];

  if(!nombre){ setStatus("Ingresá el nombre del producto", false); return; }
  if(!precio){ setStatus("Ingresá el precio", false); return; }
  if(!file){ setStatus("Seleccioná una imagen", false); return; }

  setStatus("Subiendo imagen...", true);

  try {
    const ext = file.name.split(".").pop();
    const fileName = nombre.replace(/\s+/g,"-").toLowerCase() + "-" + Date.now() + "." + ext;
    const imageUrl = await uploadToGitHub(file, fileName);

    setStatus("Guardando en Firestore...", true);

    await addDoc(collection(db, "productos"), {
      nombre: nombre,
      categoria: document.getElementById("categoria").value,
      precio: parseFloat(precio),
      imagen: imageUrl,
      agotado: document.getElementById("agotado").checked
    });

    setStatus("✅ Producto subido correctamente", true);
    document.getElementById("nombre").value="";
    document.getElementById("precio").value="";
    document.getElementById("imageFile").value="";
    document.getElementById("preview").style.display="none";
    document.getElementById("agotado").checked=false;
    loadProducts();
  } catch(e){
    setStatus("❌ Error: " + e, false);
    console.error(e);
  }
};

window.deleteProduct = async function(id){
  if(!confirm("¿Eliminar producto?")) return;
  await deleteDoc(doc(db, "productos", id));
  loadProducts();
};

async function loadProducts(){
  const tbody = document.getElementById("productsTableBody");
  tbody.innerHTML = "<tr><td colspan='5'>Cargando...</td></tr>";
  try {
    const qs = await getDocs(collection(db, "productos"));
    if(qs.empty){ tbody.innerHTML="<tr><td colspan='5'>No hay productos</td></tr>"; return; }
    tbody.innerHTML="";
    qs.forEach(d => {
      const p = d.data();
      tbody.innerHTML += `<tr>
        <td><img class="thumb" src="${p.imagen}" onerror="this.src='https://via.placeholder.com/70'"></td>
        <td>${p.nombre}</td>
        <td>Gs. ${Number(p.precio).toLocaleString()}</td>
        <td>${p.agotado?"Agotado":"Disponible"}</td>
        <td><button class="delete-btn" onclick="deleteProduct('${d.id}')">Eliminar</button></td>
      </tr>`;
    });
  } catch(e){
    tbody.innerHTML=`<tr><td colspan='5'>Error al cargar: ${e}</td></tr>`;
  }
}

loadProducts();
</script>
</body>
</html>
